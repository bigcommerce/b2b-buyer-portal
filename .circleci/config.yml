aliases:
  - &node_executor
      executor:
        name: node/node
        node-version: "18.20"

version: 2.1

orbs:
  ci: bigcommerce/internal@volatile
  node: bigcommerce/internal-node@volatile
  security: bigcommerce/internal-security@volatile
  test-coverage-reporter: bigcommerce/internal-test-coverage-reporter@volatile

jobs:
  test:
    <<: *node_executor
    resource_class: medium+
    steps:
      - ci/pre-setup
      - node/yarn-install
      - test-coverage-reporter/install
      - run:
          name: "Run unit tests for core package"
          command: |
            cd apps/storefront
            yarn coverage
      - run: # store test coverage, creating coverage dir regardless to allow persist_to_workspace below to work
          name: Code Coverage Reporter - Store Test Coverage
          command: |
            set +e
            mkdir -p ./coverage
            CC_TEST_REPORTER_CMD="$PWD/cc-test-reporter"
            FORMATTED_COVERAGE="$PWD/coverage/formatted-coverage.${CIRCLE_BUILD_NUM}.${CIRCLE_NODE_INDEX}.json"
            echo "Formatting lcov coverage to ${FORMATTED_COVERAGE}"
            # moving to apps/storefront to make sure the report / files are in the right place
            cd apps/storefront
            ../../cc-test-reporter format-coverage -t lcov -o "${FORMATTED_COVERAGE}" coverage/lcov.info
            true
      - persist_to_workspace:
          root: ./
          paths:
            - coverage
      - store_artifacts:
          path: ./apps/storefront/coverage/lcov-report

  lint:
    <<: *node_executor
    resource_class: medium+
    steps:
      - ci/pre-setup
      - node/yarn-install
      - run:
          name: "Run lint"
          command: yarn run lint

  build_and_push:
    <<: *node_executor
    resource_class: medium+
    steps:
      - ci/pre-setup
      - node/yarn-install
      - ci/gcloud_login
      - run:
          name: "Build distribution files"
          command: |
             yarn build:production
             mv apps/storefront/dist ${CIRCLE_SHA1}
             mv config ${CIRCLE_SHA1}
             tar zcf ${CIRCLE_SHA1}.tar.gz ${CIRCLE_SHA1}
             ./google-cloud-sdk/bin/gsutil cp ${CIRCLE_SHA1}.tar.gz gs://bigcommerce-common-deployment-artifact-gcs-storage/b2b-buyer-portal/${CIRCLE_SHA1}.tar.gz

workflows:
  version: 2

  default:
    jobs:
      - test
      - lint
      - ci/validate-commits
      - build_and_push:
          context: "GCR + Artifact Bucket Access"
      - ci/notify-success:
          context: "GCR + Artifact Bucket Access"
          requires:
            - build_and_push
            - ci/validate-commits
            - lint
            - test
      - security/scan:
          name: "Gitleaks secrets scan"
          context: org-global
          GITLEAKS_BLOCK: "false"

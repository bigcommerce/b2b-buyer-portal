type CollectionInfo {
  totalItems: Int!
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

interface Node {
  id: ID!
}

interface Edge {
  node: Node!
  cursor: String!
}

interface Connection {
  edges: [Edge!]!
  pageInfo: PageInfo!
  collectionInfo: CollectionInfo!
}

enum SortDirection {
  ASC
  DESC
}
